services:
  kafka:
    image: apache/kafka:3.8.1
    hostname: kafka
    ports:
      - "19094:19094"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:19094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.8.1
    depends_on:
      - kafka
    command:
      - /bin/sh
      - -c
      - |
        run_kafka() {
          "$@" >/tmp/kafka-init-stdout.log 2>/tmp/kafka-init-stderr.log
          status=$$?
          cat /tmp/kafka-init-stdout.log /tmp/kafka-init-stderr.log | grep -v -e "WARNING: Due to limitations in metric names" -e "topics with a period" -e "To avoid issues it is best to use either" || true
          return $$status
        }
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --list >/dev/null 2>&1; do
          echo "waiting for kafka"
          sleep 2
        done
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.raw --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-configs.sh --bootstrap-server kafka:19092 --alter --entity-type topics --entity-name noaa.weather.raw --add-config retention.ms=-1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.daily-average-temperature --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.yearly-average-rain-duration --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.monthly-frost-days --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.daily-temperature-ranking --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.blizzard-events --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.rapid-temperature-change --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.tourism-weather-quality --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.temperature-forecast --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.wet-period-events --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic noaa.weather.weather-regimes --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic marine.ais.positions --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic marine.buoy.observations --partitions 1 --replication-factor 1
        run_kafka /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic marine.route.recommendations --partitions 1 --replication-factor 1

  noaa-producer:
    build: .
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: noaa.weather.raw
      NOAA_HISTORICAL_YEAR: "2025"
      NOAA_FTP_HOST: ftp.ncei.noaa.gov
      NOAA_FTP_USER: anonymous
      NOAA_FTP_PASSWORD: password
      NOAA_FTP_DIR: /pub/data/noaa/2025
      NOAA_FILE_PATTERNS: "*-2025.gz"
      RUN_ONCE: "true"
      MAX_FILES_PER_POLL: "0"
      MAX_FILE_BYTES: "0"
      FTP_TIMEOUT_SECONDS: "120"
      FTP_DOWNLOAD_RETRIES: "5"
      FTP_DOWNLOAD_RETRY_BACKOFF_SECONDS: "5"
      STATE_FILE: /app/state/noaa_ftp_state.json
      LOG_LEVEL: INFO
    volumes:
      - producer_state:/app/state
    restart: "no"

  marine-pattern8-producer:
    build: .
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    command: ["python", "-m", "producer.marine_pattern8_producer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_AIS_TOPIC: marine.ais.positions
      KAFKA_BUOY_TOPIC: marine.buoy.observations
      MARITIME_DATA_YEAR: "2025"
      MARITIME_START_DATE: ${MARITIME_START_DATE:-2025-06-01}
      MARITIME_END_DATE: ${MARITIME_END_DATE:-2025-06-01}
      AIS_BASE_URL: https://coast.noaa.gov/htdata/CMSP/AISDataHandler/2025
      NDBC_STDMET_BASE_URL: https://www.ndbc.noaa.gov/data/historical/stdmet
      NDBC_BUOY_STATIONS: 41115:CARIB_PR_WEST:18.376:-67.280,41043:CARIB_PR_NORTH:21.090:-64.864,42060:CARIB_EAST:16.428:-63.210
      MAX_AIS_RECORDS_PER_DAY: ${MAX_AIS_RECORDS_PER_DAY:-5000}
      SOURCE_TIMEOUT_SECONDS: "120"
      EMIT_INTERVAL_SECONDS: "0.0"
      RESET_STATE: ${RESET_MARINE_STATE:-false}
      STATE_FILE: /app/state/marine_pattern8_state.json
      LOG_LEVEL: INFO
    volumes:
      - marine_producer_state:/app/state
    restart: "no"

  noaa-stream-client:
    build:
      context: ./patterns
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_INPUT_TOPICS: noaa.weather.raw
      STREAM_PATTERN: ${STREAM_PATTERN:-all}
      KAFKA_DAILY_AVERAGE_TOPIC: noaa.weather.daily-average-temperature
      KAFKA_YEARLY_RAIN_DURATION_TOPIC: noaa.weather.yearly-average-rain-duration
      KAFKA_MONTHLY_FROST_DAYS_TOPIC: noaa.weather.monthly-frost-days
      KAFKA_DAILY_TEMPERATURE_RANKING_TOPIC: noaa.weather.daily-temperature-ranking
      KAFKA_BLIZZARD_EVENTS_TOPIC: noaa.weather.blizzard-events
      KAFKA_RAPID_CHANGE_EVENTS_TOPIC: noaa.weather.rapid-temperature-change
      KAFKA_TOURISM_QUALITY_TOPIC: noaa.weather.tourism-weather-quality
      KAFKA_FORECAST_EVENTS_TOPIC: noaa.weather.temperature-forecast
      KAFKA_WET_PERIOD_EVENTS_TOPIC: noaa.weather.wet-period-events
      KAFKA_WEATHER_REGIME_TOPIC: noaa.weather.weather-regimes
      KAFKA_AIS_POSITIONS_TOPIC: marine.ais.positions
      KAFKA_BUOY_OBSERVATIONS_TOPIC: marine.buoy.observations
      KAFKA_ROUTE_RECOMMENDATIONS_TOPIC: marine.route.recommendations
      RAIN_DURATION_YEAR: "2025"
      FROST_COUNT_YEAR: "2025"
      TEMPERATURE_RANKING_YEAR: "2025"
      TEMPERATURE_RANKING_WINDOW_HOURS: "24"
      TEMPERATURE_RANKING_ADVANCE_MINUTES: "60"
      TEMPERATURE_RANKING_GRACE_MINUTES: "10"
      BLIZZARD_YEAR: "2025"
      BLIZZARD_WINDOW_HOURS: "24"
      BLIZZARD_ADVANCE_HOURS: "1"
      BLIZZARD_GRACE_MINUTES: "10"
      BLIZZARD_FREEZING_THRESHOLD_C: "0.0"
      BLIZZARD_WIND_THRESHOLD_MPS: "12.0"
      RAPID_CHANGE_YEAR: "2025"
      RAPID_CHANGE_WINDOW_HOURS: "24"
      RAPID_CHANGE_GRACE_MINUTES: "10"
      TOURISM_QUALITY_YEAR: "2025"
      TOURISM_QUALITY_WINDOW_HOURS: "24"
      TOURISM_QUALITY_GRACE_MINUTES: "10"
      FORECAST_WINDOW_DAYS: "30"
      FORECAST_ADVANCE_DAYS: "1"
      FORECAST_GRACE_MINUTES: "10"
      WET_DRY_PERIOD_YEAR: "2025"
      WEATHER_REGIME_YEAR: "2025"
      WEATHER_REGIME_CLUSTER_COUNT: "6"
      WEATHER_REGIME_HORIZON: "10000"
      MARITIME_ROUTING_YEAR: "2025"
      MARITIME_ROUTING_JOIN_WINDOW_MINUTES: "30"
      KAFKA_STREAMS_APPLICATION_ID_PREFIX: noaa-weather-dashboard
      KAFKA_STREAMS_APPLICATION_ID: ${KAFKA_STREAMS_APPLICATION_ID:-}
      DASHBOARD_SINK_ENABLED: "true"
      DASHBOARD_JDBC_URL: jdbc:postgresql://postgres:5432/noaa
      DASHBOARD_DB_USER: noaa
      DASHBOARD_DB_PASSWORD: noaa
      NOAA_ISD_STATION_HISTORY_URL: https://www.ncei.noaa.gov/pub/data/noaa/isd-history.txt
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noaa
      POSTGRES_USER: noaa
      POSTGRES_PASSWORD: noaa
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  kafka_data:
  producer_state:
  marine_producer_state:
  postgres_data:
  grafana_data:
