services:
  kafka:
    image: apache/kafka:3.8.1
    hostname: kafka
    ports:
      - "19094:19094"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:19094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  noaa-producer:
    build: .
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC: noaa.weather.raw
      NOAA_HISTORICAL_YEAR: "2025"
      NOAA_FTP_HOST: ftp.ncei.noaa.gov
      NOAA_FTP_USER: anonymous
      NOAA_FTP_PASSWORD: password
      NOAA_FTP_DIR: /pub/data/noaa/2025
      NOAA_FILE_PATTERNS: "*-2025.gz"
      RUN_ONCE: "true"
      MAX_FILES_PER_POLL: "0"
      MAX_FILE_BYTES: "0"
      STATE_FILE: /app/state/noaa_ftp_state.json
      LOG_LEVEL: INFO
    volumes:
      - producer_state:/app/state
    restart: "no"

volumes:
  kafka_data:
  producer_state:
